---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cert-manager.io/certificate_v1.json
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: &name postgres-client-ca
spec:
  commonName: *name
  duration: 87660h # 10 years
  isCA: true
  issuerRef:
    name: cluster-selfsigned-bootstrap
    kind: ClusterIssuer
  nameConstraints:
    critical: true
    # exclude everything, only the CN may be set
    excluded:
      dnsDomains: []
      ipRanges: []
      emailAddresses: []
      uriDomains: []
  secretName: *name
  secretTemplate:
    annotations:
      replicator.v1.mittwald.de/replicate-to: database
  privateKey:
    algorithm: ECDSA
    size: 384
    encoding: PKCS8
    rotationPolicy: Never
  usages:
    - cert sign
    - crl sign
---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cert-manager.io/clusterissuer_v1.json
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: &name postgres-client-ca
spec:
  ca:
    secretName: *name
