---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-r2
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: cloudflare-r2-secret
    template:
      data:
        ACCESS_KEY_ID: "{{ .CLOUDFLARE_R2_ACCESS_KEY_ID }}"
        ACCESS_SECRET_KEY: "{{ .CLOUDFLARE_R2_ACCESS_SECRET_KEY }}"
  dataFrom:
    - extract:
        key: cloudflare
