---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &name lldap
spec:
  targetNamespace: security
  interval: 1h
  prune: true
  path: ./cluster/apps/security/lldap/base
  components:
    - ../../../../components/volsync
  postBuild:
    substitute:
      APP: *name
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: rook-ceph-cluster
      namespace: rook-ceph
    - name: volsync
      namespace: volsync-system
