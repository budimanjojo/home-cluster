---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: radicale
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: radicale
  values:
    controllers:
      radicale:
        containers:
          app:
            image:
              repository: ghcr.io/kozea/radicale
              tag: 3.7.1@sha256:c3d3a8bbb7a4cc0accc407ff9ff80138179102b8c78b2c692780a1132d9e8c2b
            args:
              - --hosts
              - 0.0.0.0:5232
              - --auth-type
              - htpasswd
              - --auth-htpasswd-filename
              - /secret/users
              - --auth-htpasswd-encryption
              - bcrypt
              - --storage-filesystem-folder
              - /var/lib/radicale/collections
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              requests:
                cpu: 15m
                memory: 105Mi
              limits:
                memory: 105Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      config:
        existingClaim: radicale
        globalMounts:
          - path: /var/lib/radicale
      secret:
        type: secret
        name: radicale-secret
        globalMounts:
          - path: /secret
      tmp:
        type: emptyDir

    route:
      app:
        hostnames: ["dav.${SECRET_DOMAIN_0}"]
        parentRefs:
          - name: envoy-external
            namespace: network

    service:
      app:
        ports:
          http:
            port: 5232
