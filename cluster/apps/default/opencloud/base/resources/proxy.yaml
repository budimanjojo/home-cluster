---
role_assignment:
  driver: oidc
  oidc_role_mapper:
    role_claim: groups
    role_mapping:
      - role_name: admin
        claim_value: oc_admin
      - role_name: spaceadmin
        claim_value: oc_spaceadmin
      - role_name: user
        claim_value: oc_user
      - role_name: guest
        claim_value: oc_guest
