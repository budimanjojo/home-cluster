---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: firefly-iii
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
  values:
    controllers:
      firefly-iii:
        containers:
          main:
            image:
              repository: fireflyiii/core
              tag: version-6.4.14
            resources:
              requests:
                cpu: 15m
                memory: 164Mi
              limits:
                memory: 175Mi
            probes:
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
              liveness:
                enabled: true
              readiness:
                enabled: true
            envFrom:
              - secretRef:
                  name: firefly-iii-secret
            env:
              DB_CONNECTION: pgsql
              DB_HOST:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-postgres-secret
                    key: hostname
              DB_PORT:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-postgres-secret
                    key: port
              DB_DATABASE:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-postgres-secret
                    key: dbname
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-postgres-secret
                    key: username
              PGSQL_SSL_MODE:
                value: verify-full
              PGSQL_SSL_ROOT_CERT:
                value: /var/run/secrets/postgres-root-ca/ca.crt
              PGSQL_SSL_CERT:
                value: /var/run/secrets/postgres-certs/tls.crt
              PGSQL_SSL_KEY:
                value: /var/run/secrets/postgres-certs/tls.key
          cronjob:
            image:
              repository: alpine
              tag: 3.23.0
              pullPolicy: IfNotPresent
            command:
              - sh
            args:
              - -c
              - >-
                echo "0 */3 * * * wget -qO- http://firefly-iii:8080/api/v1/cron/$(STATIC_CRON_TOKEN)"
                | crontab -
                && crond -f -L /dev/stdout
            env:
              - name: STATIC_CRON_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: firefly-iii-secret
                    key: STATIC_CRON_TOKEN
    service:
      main:
        controller: firefly-iii
        ports:
          http:
            port: 8080
    route:
      main:
        hostnames: ["money.${SECRET_DOMAIN_1}"]
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - name: firefly-iii
                port: 8080
    persistence:
      data:
        enabled: true
        existingClaim: firefly-iii
        advancedMounts:
          firefly-iii:
            main:
              - path: /var/www/html/storage/upload
