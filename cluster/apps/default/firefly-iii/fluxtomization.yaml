---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: firefly-iii
spec:
  targetNamespace: default
  interval: 1h
  prune: true
  components:
    - ../../../../components/volsync
    - ../../../../components/postgres-database
  postBuild:
    substitute:
      APP: firefly-iii
  path: ./cluster/apps/default/firefly-iii/base
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: rook-ceph-cluster
      namespace: rook-ceph
