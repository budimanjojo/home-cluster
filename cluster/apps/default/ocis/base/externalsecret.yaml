---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ocis
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: bitwarden-secretsmanager
  target:
    name: ocis-secret
    template:
      data:
        OCIS_JWT_SECRET: "{{ .OCIS_JWT_SECRET }}"
        OCIS_SERVICE_ACCOUNT_ID: "{{ .OCIS_SERVICE_ACCOUNT_ID }}"
        OCIS_SERVICE_ACCOUNT_SECRET: "{{ .OCIS_SERVICE_ACCOUNT_SECRET }}"
        NOTIFICATIONS_SMTP_PASSWORD: "{{ .NOTIFICATIONS_SMTP_PASSWORD }}"
  dataFrom:
    - extract:
        key: ocis
