---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: immich
spec:
  targetNamespace: default
  components:
    - ../../../../components/postgres-database
    - ../../../../components/keda/nfs-scaler
  postBuild:
    substitute:
      APP: immich
      DATABASE_EXTENSIONS: |
        [
          { name: vchord },
          { name: earthdistance }
        ]
  interval: 1h
  prune: true
  path: ./cluster/apps/default/immich/base
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  dependsOn:
    - name: keda
      namespace: observability
