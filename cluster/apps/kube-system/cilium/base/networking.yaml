---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cilium.io/ciliumloadbalancerippool_v2.json
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: diff-subnet
spec:
  blocks:
    - cidr: 192.168.15.0/24

---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cilium.io/ciliumloadbalancerippool_v2.json
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: same-subnet
spec:
  blocks:
    - start: 192.168.200.200
      stop: 192.168.200.210

---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cilium.io/ciliumloadbalancerippool_v2.json
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: mgmt-subnet
spec:
  blocks:
    - start: 192.168.10.200
      stop: 192.168.10.210

---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cilium.io/ciliumbgpadvertisement_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: main
  labels:
    advertise: bgp
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
          - ExternalIP
      selector:
        matchExpressions:
          - key: thisFakeSelector
            operator: NotIn
            values:
              - will-match-and-announce-all-services

---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/cilium.io/ciliumbgpclusterconfig_v2.json
apiVersion: cilium.io/v2
kind: CiliumBGPClusterConfig
metadata:
  name: main
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/os: linux
  bgpInstances:
    - name: instance-65401
      localASN: 65401
      peers:
        - name: budimanjojo-firewall
          peerAddress: 192.168.200.1
          peerASN: 65400
          peerConfigRef:
            name: main
