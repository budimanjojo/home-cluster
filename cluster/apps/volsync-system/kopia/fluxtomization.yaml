---
# yaml-language-server: $schema=https://schemas.budimanjojo.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kopia
spec:
  targetNamespace: volsync-system
  interval: 1h
  prune: true
  path: ./cluster/apps/volsync-system/kopia/base
  components:
    - ../../../../components/keda/nfs-scaler
  postBuild:
    substitute:
      APP_NAME: kopia
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
